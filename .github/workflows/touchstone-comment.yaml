name: Continuous Benchmarks (Comment)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: ["Continuous Benchmarks (Receive)"]
    types:
      - completed

permissions:
  # `comment` posts the benchmark results as a PR comment and sets a commit
  # status; the default read-only GITHUB_TOKEN cannot do either.
  contents: read
  pull-requests: write
  statuses: write

jobs:
  upload:
    runs-on: ubuntu-24.04
    if: >
      ${{ github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: lorenzwalthert/touchstone/actions/comment@main
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
